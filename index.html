<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Tic Tac Toe</title>
		<link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
	</head>
	<body id="body">
		<main id="game" class="container">
			<h1 class="title">Tic Tac Toe</h1>
			<div class="game-controls">
				<div class="turn">It's X's turn</div>
				<button id="reset" class="reset">Reset</button>
			</div>
			<div id="board" class="board" aria-label="Tic Tac Toe board">
				<button data-index="0" class="btn"></button>
				<button data-index="1" class="btn"></button>
				<button data-index="2" class="btn"></button>
				<button data-index="3" class="btn"></button>
				<button data-index="4" class="btn"></button>
				<button data-index="5" class="btn"></button>
				<button data-index="6" class="btn"></button>
				<button data-index="7" class="btn"></button>
				<button data-index="8" class="btn"></button>

			</div>
		</main>
		<dialog class="dialog" id="dialog"">
			<button autofocus class="dialog-close">X</button>
			<div class="winnerDiv"> </div>
    </dialog>
	</body>
</html>
